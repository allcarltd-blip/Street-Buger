<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Street Burger - Форма</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍔 Street Burger</h1>
</header>

<nav>
    <ul class="nav-list">
        <li><a href="index.html">Про нас</a></li>
        <li><a href="menu.html">Меню</a></li>
        <li><a href="contact.html">Форма</a></li>
    </ul>
</nav>

<h2 class="page-title">Форма замовлення</h2>

<section class="form-container">

    <form>
        <label>Ваше ім’я</label>
        <input type="text" placeholder="Введіть ім’я" required>

        <label>Телефон</label>
        <input type="tel" placeholder="+32..." required>

        <label>Email</label>
        <input type="email" placeholder="example@email.com">

        <label>Оберіть бургер</label>
        <select required>
            <option value="">-- Оберіть --</option>
            <option>Класик</option>
            <option>Чіз Бум</option>
            <option>BBQ Бургер</option>
            <option>Мексиканський</option>
            <option>Street Special</option>
        </select>

        <label>Кількість</label>
        <input type="number" min="1" value="1">

        <label>Спосіб оплати</label>
        <select>
            <option>Готівка</option>
            <option>Картка</option>
            <option>Онлайн оплата</option>
        </select>

        <label>Коментар до замовлення</label>
        <textarea placeholder="Наприклад: без цибулі"></textarea>

        <button type="submit">Підтвердити замовлення</button>
    </form>

</section>

<footer>
    <p>© 2026 Street Burger | Всі права захищені</p>
</footer>

</body>
</html>
